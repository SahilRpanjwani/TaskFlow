<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Delete - TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="max-w-lg w-full bg-white shadow-md rounded-lg p-6">
        <h1 class="text-xl font-semibold text-gray-900 mb-4">Delete User</h1>
        <p class="text-gray-700 mb-6">
            Are you sure you want to delete user
            <span class="font-bold text-red-600">{{ user_to_delete.username }}</span>?
            This action cannot be undone.
        </p>

        <form method="POST">
            {% csrf_token %}
            <div class="flex justify-between">
                <a href="{% url 'manage_users' %}"
                   class="px-4 py-2 bg-gray-300 text-gray-800 rounded-md hover:bg-gray-400">
                    Cancel
                </a>
                <button type="submit"
                        class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
                    Yes, Delete
                </button>
            </div>
        </form>
    </div>

</body>
</html>
