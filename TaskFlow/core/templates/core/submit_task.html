<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Task: {{ task.title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 10px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            display: inline-block;
        }
        p {
            color: #7f8c8d;
            font-size: 1em;
            margin-bottom: 20px;
        }
        form {
            text-align: left;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        .form-group input[type="text"],
        .form-group textarea,
        .form-group input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .form-group input[type="file"] {
            padding: 3px;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        .button-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }
        .submit-btn, .cancel-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .submit-btn {
            background-color: #2ecc71;
            color: white;
        }
        .submit-btn:hover {
            background-color: #27ae60;
            box-shadow: 0 4px 8px rgba(46, 204, 113, 0.2);
        }
        .cancel-btn {
            background-color: #ecf0f1;
            color: #7f8c8d;
            text-decoration: none;
        }
        .cancel-btn:hover {
            background-color: #bdc3c7;
            color: #34495e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Submit Task: {{ task.title }}</h2>
        <p>Please upload your completed work for this task. You can submit files and add a description.</p>
        <form method="POST" enctype="multipart/form-data" novalidate>
            {% csrf_token %}

            {{ form.as_p }}

            <div class="button-group">
                <a href="{% url 'task_list' %}" class="cancel-btn">Cancel</a>
                <button type="submit" class="submit-btn">Submit Work</button>
            </div>
        </form>
    </div>
</body>
</html>
