<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review: {{ submission.task.title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .submission-info {
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: left;
            border-left: 5px solid #3498db;
        }
        .submission-info p {
            margin: 5px 0;
            font-size: 1em;
        }
        .submission-info strong {
            color: #2c3e50;
        }
        .download-link {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        .download-link:hover {
            text-decoration: underline;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        .form-group input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .form-group input[type="number"]:focus {
            border-color: #3498db;
            outline: none;
        }
        .button-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }
        .save-btn, .back-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .save-btn {
            background-color: #2ecc71;
            color: white;
        }
        .save-btn:hover {
            background-color: #27ae60;
            box-shadow: 0 4px 8px rgba(46, 204, 113, 0.2);
        }
        .back-btn {
            background-color: #ecf0f1;
            color: #7f8c8d;
            text-decoration: none;
        }
        .back-btn:hover {
            background-color: #bdc3c7;
            color: #34495e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Review Submission</h2>
        <div class="submission-info">
            <p><strong>Task:</strong> {{ submission.task.title }}</p>
            <p><strong>Submitted By:</strong> {{ submission.submitted_by.username }}</p>
            <p><strong>Submitted On:</strong> {{ submission.submitted_at|date:"M d, Y H:i" }}</p>
            <p><strong>File:</strong> <a href="{{ submission.file.url }}" class="download-link" target="_blank">Download File</a></p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_score">Score:</label>
                <input type="number" id="id_score" name="score" value="{{ submission.score|default_if_none:'' }}">
            </div>
            <div class="form-group">
                <label for="id_completion_percentage">Completion Percentage (%):</label>
                <input type="number" id="id_completion_percentage" name="completion_percentage" step="0.01" value="{{ submission.completion_percentage|default_if_none:'' }}">
            </div>

            <div class="button-group">
                <a href="{% url 'room_detail' submission.task.task_room.id %}" class="back-btn">Cancel and Go Back</a>
                <button type="submit" class="save-btn">Save Review</button>
            </div>
        </form>
    </div>
</body>
</html>
